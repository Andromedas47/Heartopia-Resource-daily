env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Daily Heartopia Scraper

on:
  schedule:
    # รอบแรก: 06:30 น. เวลาไทย (23:30 UTC)
    - cron: '30 23 * * *'
    # รอบสอง: 12:00 น. เวลาไทย (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run Scraper
        env:
          FB_EMAIL: ${{ secrets.FB_EMAIL }}
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FB_AUTH_STATE_BASE64: ${{ secrets.FB_AUTH_STATE_BASE64 }}
        run: bun run scrape