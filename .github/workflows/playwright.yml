name: Daily Heartopia Scraper

on:
  schedule:
    # รันอัตโนมัติทุกวันตอน 06:30 น. เวลาไทย (ตรงกับ 23:30 UTC)
    - cron: '30 23 * * *'
  workflow_dispatch: # เพิ่มปุ่มกดรันเองผ่านหน้าเว็บ GitHub ได้ด้วย

jobs:
  scrape:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Install dependencies
      run: bun install
      
    - name: Install Playwright Chromium
      # ลงแค่ Chromium ตัวเดียวพอเพื่อความรวดเร็ว
      run: bunx playwright install chromium --with-deps 
      
    - name: Run Scraper
      env:
        # ดึงตัวแปรจาก GitHub Secrets มาให้บอทใช้งาน
        FB_EMAIL: ${{ secrets.FB_EMAIL }}
        FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        FB_AUTH_STATE_BASE64: ${{ secrets.FB_AUTH_STATE_BASE64 }} # สำคัญมากสำหรับข้ามการ Login
      run: bun run scrape
