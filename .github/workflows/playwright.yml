env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Daily Heartopia Scraper

on:
  schedule:
    # รอบแรก: 06:30 น. เวลาไทย (23:30 UTC)
    - cron: '30 23 * * *'
    # รอบสอง: 12:00 น. เวลาไทย (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # ❌ ลบขั้นตอน Install Playwright Chromium ทิ้งไปแล้ว ประหยัดเวลาสุดๆ!

      - name: Run Scraper
        env:
          # 🟢 เหลือแค่ 2 ตัวที่ต้องใช้จริงๆ
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          APIFY_TOKEN: ${{ secrets.APIFY }} # 👈 ดึงจาก Secret ชื่อ APIFY ที่คุณพิชญ์ตั้งไว้ในเว็บ
        run: bun run scrape
