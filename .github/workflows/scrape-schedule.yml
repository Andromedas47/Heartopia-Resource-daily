name: Heartopia Scrape Scheduler

on:
  workflow_dispatch:
  schedule:
    # Asia/Bangkok (UTC+7): 06:55 daily
    - cron: '55 23 * * *'

concurrency:
  group: heartopia-scrape-schedule
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape Facebook and update MongoDB
    runs-on: ubuntu-latest
    timeout-minutes: 15 # ลดเวลาลงเพราะ API มันเร็วมาก
    env:
      CI: true
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      # 🟢 เพิ่มตัวแปร Apify เข้าไป (ใช้ชื่อ APIFY ตามที่คุณตั้งใน Secret)
      APIFY_TOKEN: ${{ secrets.APIFY }} 
      REPORT_COLLECTION: daily_reports
      SCRAPE_MAX_ATTEMPTS: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ❌ ลบ Install Playwright Chromium ทิ้งไปแล้ว (ไม่ต้องใช้แล้ว)

      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=()

          if [ -z "${MONGODB_URI:-}" ]; then
            missing+=("MONGODB_URI")
          fi

          # ✅ เปลี่ยนมาเช็กแค่ APIFY_TOKEN
          if [ -z "${APIFY_TOKEN:-}" ]; then
            missing+=("APIFY_TOKEN (Secret: APIFY)")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required configuration: ${missing[*]}"
            exit 1
          fi

      - name: Run scheduled scraper with retry
        id: scrape_run
        shell: bash
        run: |
          set -euo pipefail
          max_attempts="${SCRAPE_MAX_ATTEMPTS:-3}"

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Starting scrape attempt ${attempt}/${max_attempts}"

            # รันสคริปต์ผ่าน Bun
            if bun run scrape; then
              echo "status=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep 30
            fi
          done

          echo "status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Upload scrape logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-${{ github.run_id }}
          path: logs/**
          if-no-files-found: ignore
          retention-days: 7